                  System Bio</button>

                </svg>
                Syncing with server...

            </div>

            <div id="api-result" class="mt-4 hidden animate-in fade-in slide-in-from-top-2">
              <div class="p-4 rounded-xl border border-replLightBorder dark:border-replDarkBorder bg-white dark:bg-replDark">

  <footer
    class="py-6 border-t border-replLightBorder dark:border-replDarkBorder bg-replLight/50 dark:bg-replDark/50 text-center text-sm text-gray-500 dark:text-gray-400">
    © 2025 FF Tools. Educational use only.
  </footer>
  <script src="../js/main.js"></script>
  <script>
    (function () {
      var ta = document.getElementById('bio-text');
      var preview = document.getElementById('bio-preview');
      var cc = document.getElementById('char-count');
      var btnUpdate = document.querySelector('.btn-update-bio');
      var tokenInput = document.getElementById('access-token');
      var statusBox = document.getElementById('bio-status');
      var apiResultDiv = document.getElementById('api-result');
      var responseContainer = document.getElementById('api-response-container');

      function sanitize(s) { return s.replace(/[&<>]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]); }); }

      function renderPreview(s) {
        // Free Fire tag parsing logic
        var safe = sanitize(s).replace(/\r?\n/g, '<br>');
        
        // Parse [b], [i], [b][i] as simple modifiers
        // In FF these often apply to the rest of the text or until another tag.
        // For preview, we treat them as individual tags.
        safe = safe.replace(/\[b\]/gi, '<span style="font-weight:bold">')
                   .replace(/\[i\]/gi, '<span style="font-style:italic">');
        
        // Match [XXXXXX] hex colors
        safe = safe.replace(/\[([0-9a-fA-F]{6})\]/g, '</span><span style="color:#$1">');
        
        // Wrap everything to ensure spans can be closed (oversimplified for preview)
        preview.innerHTML = '<span style="font-weight:normal; font-style:normal">' + safe + '</span>';
      }

      function updateCount() {
        var len = ta.value.length;
        cc.textContent = len + ' / 180';
        if (len > 180) { 
          ta.value = ta.value.substring(0, 180);
          len = 180;
          cc.textContent = '180 / 180';
          cc.classList.add('text-red-500'); 
        } else { 
          cc.classList.remove('text-red-500'); 
        }
        renderPreview(ta.value);
      }

      ta.addEventListener('input', updateCount); 
      updateCount();

      function insertTag(tag) {
        var start = ta.selectionStart, end = ta.selectionEnd;
        var before = ta.value.slice(0, start), sel = ta.value.slice(start, end), after = ta.value.slice(end);
        var insert = tag + (sel || '');
        if (ta.value.length + tag.length > 180) return;
        ta.value = before + insert + after;
        var pos = before.length + insert.length;
        ta.setSelectionRange(pos, pos);
        ta.focus(); 
        updateCount();
      }

      document.getElementById('btn-bold').onclick = function () { insertTag('[b]'); };
      document.getElementById('btn-italic').onclick = function () { insertTag('[i]'); };
      document.getElementById('btn-bolditalic').onclick = function () { insertTag('[b][i]'); };

      // Color swatches (FF Style)
      (function () {
        var palette = ['FFFFFF', 'FF0000', '00FF00', '0000FF', 'FFFF00', '00FFFF', 'FF00FF', 'FFA500', 'FF5555', '55FF55', '5555FF', 'FF55FF', 'FFFF55', '121212', 'FF8800', 'BB00FF', '00FF88', '0088FF', 'FF0088', '88FF00', '444444', 'AAAAAA', 'EEEEEE', 'FFCCAA'];
        var sw = document.getElementById('color-swatches');
        palette.forEach(function (c) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'w-5 h-5 rounded border border-gray-300 dark:border-white/10 focus:outline-none hover:scale-110 transition-transform';
          b.style.backgroundColor = '#' + c;
          b.title = '#' + c;
          b.onclick = function () { insertTag('[' + c + ']'); };
          sw.appendChild(b);
        });
      })();

      btnUpdate.onclick = async function () {
        var bioContent = ta.value.trim();
        if (!bioContent) { alert('Pehle bio likhein.'); return; }
        var token = tokenInput.value.trim();
        if (!token) { alert('Access token paste karein.'); return; }

        statusBox.classList.remove('hidden');
        apiResultDiv.classList.add('hidden');
        btnUpdate.disabled = true;

        try {
          var url = 'http://raw.sukhdaku.qzz.io/bio/update_bio?access_token=' + encodeURIComponent(token) + '&bio=' + encodeURIComponent(bioContent);
          var res = await fetch(url, { method: 'GET' });
          var data = await res.json();

          responseContainer.innerHTML = '';
          apiResultDiv.classList.remove('hidden');

          if (data && data.status === 'success') {
            // Display formatted fields from the response
            const fields = [
              { label: 'Status', value: data.status, color: 'text-green-500' },
              { label: 'Nickname', value: data.nickname },
              { label: 'UID', value: data.uid },
              { label: 'Region', value: data.region },
              { label: 'Platform', value: data.platform },
              { label: 'Bio', value: data.bio }
            ];

            fields.forEach(f => {
              if (f.value === undefined) return;
              const div = document.createElement('div');
              div.className = 'flex flex-col mb-2 pb-2 border-b border-gray-100 dark:border-white/5 last:border-0';
              const l = document.createElement('span');
              l.className = 'text-[9px] font-bold text-gray-400 uppercase';
              l.textContent = f.label;
              div.appendChild(l);
              
              if (f.pre) {
                const p = document.createElement('pre');
                p.className = 'mt-1 p-2 text-[10px] bg-gray-50 dark:bg-black/30 rounded overflow-x-auto text-gray-500';
                p.textContent = f.value;
                div.appendChild(p);
              } else {
                const v = document.createElement('span');
                v.className = 'text-xs font-semibold break-all ' + (f.color || 'text-gray-900 dark:text-gray-100');
                v.textContent = f.value;
                div.appendChild(v);
              }
              responseContainer.appendChild(div);
            });
          } else {
            responseContainer.innerHTML = `<div class="p-3 bg-red-500/10 text-red-500 rounded-lg text-xs font-bold border border-red-500/20">Update failed. check your token or bio content.</div>`;
          }
        } catch (e) {
          responseContainer.innerHTML = `<div class="p-3 bg-red-500/10 text-red-500 rounded-lg text-xs font-bold border border-red-500/20">Error: Service Temporarily Unavailable.</div>`;
        } finally {
          statusBox.classList.add('hidden');
          btnUpdate.disabled = false;
        }
      };
    })();
  </script>
