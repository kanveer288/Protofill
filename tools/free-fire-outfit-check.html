<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Fire Outfit Check - Character Outfits & Skins</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            replLight: '#FBFCFD',
            replLightSurface: '#FFFFFF',
            replLightBorder: '#E5E7EB',
            replLightHover: '#F3F4F6',
            replDark: '#0E1525',
            replDarkSurface: '#1C2333',
            replDarkBorder: '#2B3245',
            replDarkHover: '#2C334A',
            replAccent: '#0F87FF'
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
            display: ['"Outfit"', 'system-ui', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../js/theme.js"></script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-replLight text-gray-900 dark:bg-replDark dark:text-gray-100 min-h-screen antialiased transition-colors duration-300; }
      h1, h2, h3 { @apply font-display tracking-tight; }
    }
    .repl-card {
      @apply bg-replLightSurface border border-replLightBorder rounded-xl shadow-sm dark:bg-replDarkSurface dark:border-replDarkBorder;
    }
    .repl-inner-card {
      @apply border border-replLightBorder dark:border-replDarkBorder bg-gray-50 dark:bg-replDark p-4 rounded-xl;
    }
    .theme-toggle-btn.active { @apply bg-gray-200 text-gray-900 dark:bg-replDarkBorder dark:text-white; }
  </style>
  <meta name="monetag" content="02fb45f72d74cb3e0e8645f706c751af">
</head>
<body>
  <header class="sticky top-0 z-50 border-b border-replLightBorder dark:border-replDarkBorder bg-replLight/90 dark:bg-replDark/90 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14 sm:h-16">
      <a href="../index.html" class="flex items-center gap-2 font-bold text-gray-900 dark:text-white">
        <span class="flex items-center justify-center w-8 h-8 rounded bg-replAccent text-white shrink-0 font-display font-bold text-lg">FF</span>
        <span class="hidden sm:inline">Tools & Blog</span>
      </a>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1">
          <div class="flex rounded-md bg-gray-100 dark:bg-replDarkSurface border border-gray-200 dark:border-replDarkBorder p-0.5" role="group">
            <button type="button" data-theme="day" class="theme-btn theme-toggle-btn p-1.5 rounded text-gray-500 hover:text-gray-900 dark:hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></button>
            <button type="button" data-theme="night" class="theme-btn theme-toggle-btn p-1.5 rounded text-gray-500 hover:text-gray-900 dark:hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="py-8 sm:py-12">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
      <a href="../index.html#tools" class="inline-flex items-center gap-1 text-gray-500 hover:text-replAccent text-sm font-medium mb-6 transition">← Back to Tools</a>
      
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Free Fire Outfit Check</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm">Kisi player ke character outfits aur skins dekhne ke liye Player ID enter karein.</p>

        <div class="repl-card p-5 mb-5 transition-all duration-300">
          <label for="outfit-player-id" class="block font-medium text-sm text-gray-900 dark:text-white mb-2">Player ID</label>
          <input type="text" id="outfit-player-id" placeholder="Enter Player ID" class="w-full px-4 py-2 text-sm rounded-md bg-gray-50 dark:bg-replDark border border-replLightBorder dark:border-replDarkBorder text-gray-900 dark:text-white focus:ring-1 focus:ring-replAccent focus:outline-none transition-colors mb-4">
          
          <div class="mb-5">
            <span class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">Background:</span>
            <div class="flex flex-wrap items-center gap-4">
              <label class="inline-flex items-center gap-1.5"><input type="radio" name="bg" value="1" class="bg-radio accent-replAccent" checked><span class="text-sm">BG 1</span></label>
              <label class="inline-flex items-center gap-1.5"><input type="radio" name="bg" value="2" class="bg-radio accent-replAccent"><span class="text-sm">BG 2</span></label>
              <label class="inline-flex items-center gap-1.5"><input type="radio" name="bg" value="3" class="bg-radio accent-replAccent"><span class="text-sm">BG 3</span></label>
            </div>
          </div>
          
          <button type="button" class="w-full text-center px-5 py-2 rounded-md bg-replAccent hover:bg-blue-600 text-white font-medium text-sm transition-colors btn-outfit flex justify-center items-center gap-2">Check Outfits <span id="outfit-loading" class="hidden opacity-70">...</span></button>
        </div>
      </div>

      <div class="repl-card p-6 hidden mb-6" id="outfit-result">
        <h3 class="font-semibold text-lg text-gray-900 dark:text-white mb-5 border-b border-replLightBorder dark:border-replDarkBorder pb-3">Generated Image</h3>
            <div class="flex flex-col md:flex-row items-start gap-6">
              <div class="repl-inner-card w-full md:w-auto flex justify-center items-center select-none bg-gray-100 dark:bg-black/20">
                <img id="of-image" alt="Outfit image" class="max-w-full h-auto rounded-lg hidden">
                <span id="of-image-fallback" class="text-sm text-gray-500 dark:text-gray-400"></span>
              </div>
              <div class="flex flex-col gap-3">
                <a id="of-download" href="#" download="outfit.png" class="px-5 py-2.5 rounded-lg border-2 border-replAccent text-replAccent font-semibold hover:bg-replAccent hover:text-white transition-colors text-center">Download Image</a>
                <p id="outfit-result-text" class="text-sm text-gray-500 dark:text-gray-400 mt-2"></p>
              </div>
            </div>
          </div>
      </div>
    </div>
  </main>

  <footer class="py-6 border-t border-replLightBorder dark:border-replDarkBorder bg-replLight/50 dark:bg-replDark/50 text-center text-sm text-gray-500 dark:text-gray-400">
    © 2025 FF Tools. Educational use only.
  </footer>
  <script src="../js/main.js"></script>
  <script>
    (function(){
      var btn = document.querySelector('.btn-outfit');
      var input = document.getElementById('outfit-player-id');
      var box = document.getElementById('outfit-result');
      var loading = document.getElementById('outfit-loading');
      var text = document.getElementById('outfit-result-text');
      var img = document.getElementById('of-image');
      var fallback = document.getElementById('of-image-fallback');
      function getBg(){
        var el = document.querySelector('input[name="bg"]:checked');
        return el ? el.value : '1';
        }
      async function onClick(){
        var uid = (input.value || '').trim();
        text.textContent = ''; fallback.textContent = ''; img.classList.add('hidden');
        if (!/^\d+$/.test(uid)){ text.textContent = 'UID must be numeric.'; box.classList.remove('hidden'); return; }
        var bg = getBg();
        var url = 'https://outfit.sukhdaku.qzz.io/api/v1/profile?uid=' + encodeURIComponent(uid) + '&bg=' + encodeURIComponent(bg);
        loading.classList.remove('hidden');
        try{
          var res = await fetch(url, { mode: 'cors' });
          var ct = res.headers.get('content-type') || '';
          if (!res.ok){ throw new Error('Request failed: ' + res.status); }
          if (ct.startsWith('image/')){
            var blob = await res.blob();
            var obj = URL.createObjectURL(blob);
            img.src = obj;
            img.classList.remove('hidden');
            var a = document.getElementById('of-download');
            a.href = obj;
            text.textContent = 'UID: ' + uid + ' • BG: ' + bg;
          } else {
            var t = await res.text();
            try{
              var j = JSON.parse(t);
              if (j && j.error){ throw new Error(j.error); }
            }catch(_) {}
            throw new Error('Unexpected response.');
          }
          box.classList.remove('hidden');
        }catch(e){
          fallback.textContent = (e && e.message) ? e.message : 'Error occurred.';
          box.classList.remove('hidden');
        }finally{
          loading.classList.add('hidden');
        }
      }
      btn.addEventListener('click', onClick);
    })();
  </script>
</body>
</html>
